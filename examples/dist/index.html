<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@ldesign/color 演示</title>
    <meta name="description" content="@ldesign/color 高性能颜色生成库演示" />
    <style>
      /* 基础样式重置 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 
                     'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        background-color: #fff;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* 暗黑模式基础样式 */
      [data-theme="dark"] body {
        background-color: #141414;
        color: #f0f0f0;
      }
      
      /* 加载动画 */
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 18px;
        color: #1890ff;
      }
      
      .loading::after {
        content: '';
        width: 20px;
        height: 20px;
        margin-left: 10px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #1890ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-DDP6rfMS.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CltZPk7y.css">
  </head>
  <body>
    <div id="app">
      <div class="loading">正在加载演示应用...</div>
    </div>
  </body>
</html>
